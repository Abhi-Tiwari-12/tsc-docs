<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TSC Docs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fa;
  --surface:#ffffff;
  --s2:#f1f3f4;
  --s3:#e8eaed;
  --border:#dadce0;
  --bdark:#bdc1c6;
  --accent:#1a73e8;
  --accent-h:#1557b0;
  --accent-bg:#e8f0fe;
  --accent-mid:#aecbfa;
  --accent-text:#1967d2;
  --text:#202124;
  --t2:#3c4043;
  --t3:#5f6368;
  --t4:#80868b;
  --t5:#bdc1c6;
  --red:#d93025;
  --red-bg:#fce8e6;
  --amber:#f29900;
  --amber-bg:#fef7e0;
  --green:#188038;
  --green-bg:#e6f4ea;
  --sw:220px;
  --hh:52px;
  --r:8px;
  --r2:12px;
  --sh:0 1px 2px rgba(60,64,67,.1),0 1px 3px rgba(60,64,67,.08);
  --shm:0 1px 3px rgba(60,64,67,.12),0 2px 8px rgba(60,64,67,.1);
  --shl:0 4px 16px rgba(60,64,67,.16),0 1px 4px rgba(60,64,67,.08);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdark);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--t4)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── HEADER ── */
header{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;z-index:300;box-shadow:0 1px 2px rgba(60,64,67,.08)}
.brand{width:var(--sw);min-width:var(--sw);display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;flex-shrink:0}
.bmark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bmark svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.bname{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.bname em{font-style:normal;color:var(--accent)}
.htop{flex:1;display:flex;align-items:center;padding:0 20px;gap:10px;height:100%}
.hbread{display:flex;align-items:center;gap:6px;font-size:13px}
.hbread .seg{color:var(--t3);font-weight:400}
.hbread .sep{color:var(--t5)}
.hbread .cur{color:var(--text);font-weight:500}
.hspace{flex:1}
.hbtns{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 16px;height:32px;border-radius:4px;border:1px solid var(--border);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;background:var(--surface);color:var(--t2)}
.btn:hover{background:var(--s2);box-shadow:var(--sh)}
.btn svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:var(--accent-h);border-color:var(--accent-h);color:#fff;box-shadow:0 1px 3px rgba(26,115,232,.4)}
.btn-sm{height:28px;padding:0 12px;font-size:12.5px}
.ib{width:32px;height:32px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .12s;flex-shrink:0}
.ib:hover{background:var(--s2)}
.ib svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}

/* ── LAYOUT ── */
.layout{display:flex;position:fixed;top:var(--hh);bottom:24px;left:0;right:0;overflow:hidden}

/* ── SIDEBAR ── */
aside{width:var(--sw);min-width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-nav{padding:8px 0}
.ni{display:flex;align-items:center;gap:10px;padding:0 16px;height:36px;border-radius:0 18px 18px 0;margin-right:12px;cursor:pointer;font-size:13.5px;font-weight:400;color:var(--t2);transition:all .1s;user-select:none;margin-bottom:1px}
.ni:hover{background:var(--s2)}
.ni.active{background:var(--accent-bg);color:var(--accent-text);font-weight:600}
.ni svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.ni .nbadge{margin-left:auto;font-size:11px;font-weight:500;color:var(--t4)}
.ni.active .nbadge{color:var(--accent)}
.sb-div{height:1px;background:var(--border);margin:4px 0}
.sb-label{padding:8px 16px 4px;font-size:11px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.8px}
.sb-footer-btn{margin:8px 12px;height:34px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s;font-family:inherit;font-weight:500;width:calc(100% - 24px);white-space:nowrap;overflow:hidden;padding:0 8px}
.sb-footer-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.sb-footer-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}

/* ── MAIN ── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}

/* ── EMPTY STATE ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;animation:fadeUp .2s ease}
.empty-ico{width:60px;height:60px;border-radius:16px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.empty-ico svg{width:28px;height:28px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-state h3{font-size:16px;font-weight:600;color:var(--text)}
.empty-state p{font-size:13px;color:var(--t3);text-align:center;max-width:240px;line-height:1.6}

/* ── SNACKBAR ── */
.snackbar{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--t2);color:#fff;padding:0 16px 0 14px;height:44px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;animation:sbIn .22s cubic-bezier(.34,1.56,.64,1) forwards;box-shadow:0 4px 20px rgba(32,33,36,.28),0 1px 4px rgba(32,33,36,.16);display:flex;align-items:center;gap:9px;min-width:200px;max-width:420px}
.snackbar.ok{background:#1a7a34}
.snackbar.err{background:#c5221f}
.snackbar-ico{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15)}
.snackbar-ico svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.snackbar-msg{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.snackbar-x{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.12);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;margin-left:4px;flex-shrink:0}
.snackbar-x:hover{background:rgba(255,255,255,.24)}
.snackbar-x svg{width:9px;height:9px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}
@keyframes sbIn{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes sbOut{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(10px)}}

/* ── FOOTER ── */
footer{position:fixed;bottom:0;left:0;right:0;height:24px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11.5px;color:var(--t4);z-index:300}
footer span{color:var(--t3);font-weight:500}

/* ═══════════════════════════════════
   GRID VIEW
═══════════════════════════════════ */
.grid-view{flex:1;overflow-y:auto;display:flex;flex-direction:column;animation:fadeUp .2s ease}
.gv-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.gv-title{font-size:15px;font-weight:600;color:var(--text);flex:1}
.gv-search{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid transparent;border-radius:24px;padding:0 14px;height:36px;transition:all .15s}
.gv-search:focus-within{background:var(--surface);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.gv-search svg{width:14px;height:14px;stroke:var(--t4);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.gv-search input{background:none;border:none;outline:none;font-family:inherit;font-size:13px;color:var(--text);width:160px}
.gv-search input::placeholder{color:var(--t4)}
.gv-body{flex:1;padding:20px 24px 24px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}

/* Flow/Doc/Sheet/API cards */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;cursor:pointer;transition:all .15s;position:relative}
.item-card:hover{border-color:var(--accent-mid);box-shadow:var(--shm);transform:translateY(-1px)}
.item-card:hover .card-actions{opacity:1}
.card-preview{height:120px;background:var(--s2);border-bottom:1px solid var(--border);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-body{padding:12px 14px 13px}
.card-name{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--t4)}
.card-type-badge{font-size:10.5px;font-weight:600;padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;letter-spacing:.3px}
.badge-flow{background:#e8f0fe;color:#1967d2}
.badge-doc{background:#e6f4ea;color:#137333}
.badge-sheet{background:#f3e8fd;color:#7b1fa2}
.badge-api{background:#fef0e0;color:#b06000}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:3px;opacity:0;transition:opacity .12s}
.ca-btn{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.92);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .12s;backdrop-filter:blur(4px)}
.ca-btn:hover{color:var(--red);background:var(--red-bg);border-color:#f5c6c2}
.ca-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.new-card{background:var(--surface);border:1.5px dashed var(--bdark);border-radius:var(--r2);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:170px;color:var(--t4)}
.new-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.new-card-ico{width:36px;height:36px;border-radius:8px;background:var(--s2);display:flex;align-items:center;justify-content:center;transition:all .15s}
.new-card:hover .new-card-ico{background:rgba(26,115,232,.12)}
.new-card-ico svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.new-card span{font-size:12.5px;font-weight:500}

/* Flow mini preview */
.flow-preview-node{position:absolute;border-radius:4px;border:1.5px solid;font-size:7.5px;font-weight:600;display:flex;align-items:center;gap:3px;padding:0 5px;height:18px}

/* Doc preview */
.doc-preview-wrap{position:absolute;inset:0;overflow:hidden}
.doc-preview-inner{position:absolute;top:0;left:0;transform:scale(.5);transform-origin:top left;width:200%;background:var(--surface);padding:20px 22px;font-size:13px;line-height:1.7;pointer-events:none}
.doc-preview-inner h1{font-size:18px;font-weight:700;margin-bottom:6px;color:var(--text)}
.doc-preview-inner p{color:var(--t2);margin-bottom:4px}
.doc-preview-fade{position:absolute;bottom:0;left:0;right:0;height:52px;background:linear-gradient(transparent,var(--s2))}

/* Sheet mini */
.sheet-mini{display:grid;grid-template-columns:26px repeat(4,1fr);gap:0;padding:6px;pointer-events:none}
.sheet-mini-cell{border:.5px solid var(--border);font-size:7px;font-family:'JetBrains Mono',monospace;padding:0 3px;display:flex;align-items:center;height:18px;overflow:hidden;color:var(--t2)}
.sheet-mini-cell.hd{background:var(--s3);font-weight:600;color:var(--t4);justify-content:center}

/* API card */
.api-card-top{padding:12px 14px 8px}
.api-card-url{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);word-break:break-all;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:4px}
.method-pill{font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.3px}
.m-GET{background:#e6f4ea;color:#137333}.m-POST{background:#e8f0fe;color:#1967d2}
.m-PUT{background:#fef0e0;color:#b06000}.m-PATCH{background:#f3e8fd;color:#7b1fa2}
.m-DELETE{background:#fce8e6;color:#c5221f}

/* curl card — API playground tiles */
.curl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;position:relative;transition:all .15s;display:flex;flex-direction:column}
.curl-card:hover{border-color:var(--accent-mid);box-shadow:var(--shm);transform:translateY(-1px)}
.curl-card:hover .card-actions{opacity:1}
.curl-card-head{padding:13px 14px 10px;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border)}
.curl-card-ico{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--s2)}
.curl-card-ico svg{width:15px;height:15px;stroke:var(--t3);fill:none;stroke-width:1.75;stroke-linecap:round}
.curl-card-info{flex:1;min-width:0}
.curl-card-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.curl-card-method{display:inline-flex;align-items:center}
.curl-card-body{padding:10px 14px 12px;flex:1}
.curl-card-curl{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--t4);line-height:1.55;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;word-break:break-all;background:var(--s2);border-radius:5px;padding:7px 9px;border:1px solid var(--border)}
.curl-card-footer{padding:8px 14px 10px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border)}
.curl-test-btn{height:28px;padding:0 14px;border-radius:4px;background:var(--accent);border:none;color:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px}
.curl-test-btn:hover{background:var(--accent-h)}
.curl-test-btn svg{width:10px;height:10px;fill:currentColor}
.curl-card-date{font-size:11px;color:var(--t5);margin-left:auto}

/* ═══════════════════════════════════
   MODAL
═══════════════════════════════════ */
.modal-back{position:fixed;inset:0;background:rgba(32,33,36,.45);display:flex;align-items:center;justify-content:center;z-index:800;animation:fadeIn .15s ease}
.modal-box{background:var(--surface);border-radius:var(--r2);width:440px;box-shadow:var(--shl);overflow:hidden}
.modal-head{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:600;color:var(--text)}
.modal-body{padding:16px 24px}
.modal-foot{padding:0 24px 20px;display:flex;justify-content:flex-end;gap:8px}
.flbl{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px}
.finp{width:100%;padding:0 12px;height:36px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .12s;margin-bottom:14px}
.finp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.finp:last-child,.finp.no-mb{margin-bottom:0}
.f2col{display:grid;grid-template-columns:90px 1fr;gap:8px}

/* ═══════════════════════════════════
   DOC OVERLAY
═══════════════════════════════════ */
.doc-overlay{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;flex-direction:column;animation:fadeUp .15s ease}
.do-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:10px}
.do-title{background:none;border:none;outline:none;font-family:inherit;font-size:15px;font-weight:600;color:var(--text);flex:1}
.do-title::placeholder{color:var(--t5)}
.save-ind{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--t4)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sdot.dirty{background:var(--amber)}
.pill{display:inline-flex;align-items:center;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.pill-doc{background:#e6f4ea;color:#137333}
.pill-flow{background:#e8f0fe;color:#1967d2}
.pill-sheet{background:#f3e8fd;color:#7b1fa2}
.pill-api{background:#fef0e0;color:#b06000}
.ed-tbar{background:var(--surface);border-bottom:1px solid var(--border);padding:4px 20px;display:flex;align-items:center;gap:1px;flex-shrink:0}
.tbb{height:28px;min-width:28px;padding:0 5px;border-radius:4px;background:none;border:none;cursor:pointer;color:var(--t2);font-size:12.5px;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .1s}
.tbb:hover{background:var(--s2)}
.tbb svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.75}
.tb-sel{appearance:none;background:var(--s2);border:1px solid var(--border);border-radius:4px;outline:none;color:var(--t2);font-size:12px;font-family:inherit;cursor:pointer;padding:0 8px;height:28px}
.tb-sel:focus{border-color:var(--accent)}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 4px}
.ed-scroll{flex:1;overflow-y:auto;background:var(--bg);padding:28px 0}
.ed-page{max-width:760px;margin:0 auto;padding:0 32px}
.ebody{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:40px 52px;min-height:500px;outline:none;font-size:14.5px;line-height:1.85;color:var(--text)}
.ebody:empty::before{content:attr(data-placeholder);color:var(--t5)}
.ebody h1{font-size:24px;font-weight:700;margin:20px 0 10px}
.ebody h2{font-size:18px;font-weight:600;margin:16px 0 8px}
.ebody h3{font-size:15px;font-weight:600;margin:12px 0 5px;color:var(--t2)}
.ebody p{margin-bottom:8px}
.ebody ul,.ebody ol{padding-left:22px;margin-bottom:8px}
.ebody li{margin-bottom:3px}
.ebody blockquote{border-left:3px solid var(--accent);margin:12px 0;padding:8px 16px;color:var(--t2);background:var(--accent-bg);border-radius:0 var(--r) var(--r) 0}
.ebody code{background:var(--s2);color:var(--accent-text);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:12.5px}
.ebody a{color:var(--accent)}
.ebody hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.ed-footer{max-width:760px;margin:0 auto;padding:6px 32px;display:flex;justify-content:flex-end;font-size:11.5px;color:var(--t4);font-family:'JetBrains Mono',monospace}

/* ═══════════════════════════════════
   SHEET VIEW
═══════════════════════════════════ */
.sheet-view{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeUp .15s ease}
.sv-head{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px}
.sv-title{background:none;border:none;outline:none;font-family:inherit;font-size:15px;font-weight:600;color:var(--text);flex:1}
.sv-tbar{background:var(--surface);border-bottom:1px solid var(--border);padding:4px 12px;display:flex;align-items:center;gap:2px}

.stb:hover{background:var(--s2)}.stb.on{background:var(--accent-bg);color:var(--accent-text)}

.stb-sel{appearance:none;background:var(--s2);border:1px solid var(--border);outline:none;color:var(--t2);font-size:11.5px;font-family:inherit;cursor:pointer;padding:0 6px;height:26px;border-radius:4px}
.sv-fx{background:var(--surface);border-bottom:1px solid var(--border);padding:3px 12px;display:flex;align-items:center;gap:8px}
.fx-ref{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--t2);background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;min-width:48px;text-align:center}
.fx-sep{color:var(--t4);font-size:12px;font-family:'JetBrains Mono',monospace}

.sgrid{border-collapse:collapse;table-layout:fixed;font-family:'JetBrains Mono',monospace;font-size:12px}

.sgrid th.ch{top:0}
.sgrid th.hi{background:var(--accent-bg);color:var(--accent-text)}
.scell{border:1px solid var(--border);padding:0 5px;height:22px;min-width:92px;width:92px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:cell;position:relative;color:var(--text);vertical-align:middle;outline:none}
.scell:focus{border:2px solid var(--accent);padding:0 4px;z-index:1}
.scell.hi{background:var(--accent-bg)}
.sv-tabs{background:var(--surface);border-top:1px solid var(--border);padding:0 10px;height:30px;display:flex;align-items:flex-end;gap:1px}
.sh-tab{padding:5px 12px;border-radius:4px 4px 0 0;border:1px solid transparent;font-size:12px;cursor:pointer;color:var(--t3);background:none;font-family:inherit;transition:all .1s;font-weight:400}
.sh-tab.active{background:var(--surface);border-color:var(--border);border-bottom-color:var(--surface);color:var(--text);font-weight:500;margin-bottom:-1px}

/* ═══════════════════════════════════
   PROFESSIONAL FLOW BUILDER
   — Light surface, Material-inspired
═══════════════════════════════════ */
.flow-view{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeUp .15s ease}
.fv-head{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px}
.fv-title{background:none;border:none;outline:none;font-family:inherit;font-size:15px;font-weight:600;color:var(--text);flex:1}
.fv-title::placeholder{color:var(--t5)}
.fcanvas{flex:1;position:relative;overflow:hidden;background:#fafbfc;cursor:default}
.fgrid-bg{position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,#c0cad5 1px,transparent 1px);
  background-size:20px 20px}
#fsvg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}

/* ── TOP RIGHT FLOW BUTTONS ── */
.fhbtn{display:inline-flex;align-items:center;gap:5px;padding:0 12px;height:30px;border-radius:4px;background:var(--surface);border:1px solid var(--border);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .12s;color:var(--t2)}
.fhbtn:hover{background:var(--s2);box-shadow:var(--sh)}
.fhbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.fhbtn.primary:hover{background:var(--accent-h)}
.fhbtn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}

/* ── LEFT TOOLBAR ── */
.flow-ltoolbar{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shm);display:flex;flex-direction:column;gap:1px;padding:4px;z-index:50}
.flt{width:36px;height:36px;border-radius:7px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .12s;position:relative}
.flt:hover{background:var(--s2);color:var(--text)}
.flt.active{background:var(--accent-bg);color:var(--accent)}
.flt svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.flt-sep{height:1px;background:var(--border);margin:2px 4px}
.flt-tooltip{position:absolute;left:46px;top:50%;transform:translateY(-50%);background:var(--t2);color:#fff;font-size:11.5px;font-weight:500;padding:5px 10px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;z-index:100;box-shadow:var(--shm)}
.flt:hover .flt-tooltip{opacity:1}

/* ── SHAPE LIBRARY ── */
.shape-lib{position:absolute;left:64px;top:50%;transform:translateY(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--shl);padding:14px;z-index:60;width:220px;animation:fadeUp .12s ease}
.shape-lib-ttl{font-size:11px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.shape-lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.slcard{padding:9px 10px;border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:8px;background:var(--surface)}
.slcard:hover{border-color:var(--accent-mid);background:var(--accent-bg)}
.slcard-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.slcard-label{font-size:12px;font-weight:500;color:var(--t2)}

/* ── ZOOM BAR ── */
.zoom-bar{position:absolute;bottom:16px;right:168px;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:var(--sh);display:flex;align-items:center;overflow:hidden;z-index:50}
.zb{width:30px;height:28px;background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.zb:hover{background:var(--s2);color:var(--text)}
.zlbl{font-size:11.5px;font-family:'JetBrains Mono',monospace;color:var(--t3);padding:0 10px;border-left:1px solid var(--border);border-right:1px solid var(--border);height:28px;display:flex;align-items:center;min-width:50px;justify-content:center;font-weight:500}

/* ── MINIMAP ── */
.minimap{position:absolute;bottom:16px;right:14px;width:148px;height:94px;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--sh);overflow:hidden;z-index:50}
.minimap canvas{width:100%;height:100%;display:block}

/* ── FLOW NODES — professional light ── */
.fn{position:absolute;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;box-shadow:var(--sh);cursor:grab;user-select:none;min-width:180px;max-width:220px;transition:border-color .12s,box-shadow .12s}
.fn:hover{box-shadow:var(--shm)}
.fn.sel{border-color:var(--accent)!important;box-shadow:0 0 0 3px var(--accent-bg),var(--shm)!important}
.fn.drag{cursor:grabbing;box-shadow:var(--shl);z-index:100}
.nh{display:flex;align-items:center;gap:7px;padding:8px 10px 7px;border-bottom:1px solid var(--border);border-radius:7px 7px 0 0}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ntitle{font-size:12.5px;font-weight:600;color:var(--text);flex:1;outline:none;background:none;border:none;cursor:text;min-width:0;font-family:inherit}
.nacts{display:flex;gap:2px;opacity:0;transition:opacity .1s}.fn:hover .nacts{opacity:1}
.nab{width:20px;height:20px;border-radius:4px;background:none;border:none;cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;transition:all .1s}
.nab:hover{background:var(--s2);color:var(--text)}.ndel:hover{background:var(--red-bg)!important;color:var(--red)!important}
.nab svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round}
.nb{padding:7px 10px;font-size:11.5px;color:var(--t3);line-height:1.5;min-height:30px;outline:none;cursor:text;word-break:break-word;font-family:inherit}
.nb[contenteditable]:empty::before{content:attr(data-placeholder);color:var(--t5)}
.nfoot{display:flex;align-items:center;justify-content:space-between;padding:5px 10px 7px;border-top:1px solid var(--border)}
.nbadge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;letter-spacing:.4px}
.nport{width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--s2);cursor:crosshair;transition:all .12s}
.nport:hover{border-color:var(--accent);background:var(--accent);transform:scale(1.4)}

/* Node type colors */
.nt-start .ndot{background:#188038}.nt-start .nbadge{background:#e6f4ea;color:#137333}.nt-start .nh{background:#f0f9f2}
.nt-process .ndot{background:var(--accent)}.nt-process .nbadge{background:var(--accent-bg);color:var(--accent-text)}.nt-process .nh{background:#f0f5fe}
.nt-decision .ndot{background:#f29900}.nt-decision .nbadge{background:#fef7e0;color:#7a4f00}.nt-decision .nh{background:#fef9ec}
.nt-api .ndot{background:#12808c}.nt-api .nbadge{background:#e0f6f8;color:#12808c}.nt-api .nh{background:#f0fbfc}
.nt-note .ndot{background:#7b1fa2}.nt-note .nbadge{background:#f3e8fd;color:#6b18a8}.nt-note .nh{background:#faf0fe}
.nt-end .ndot{background:#d93025}.nt-end .nbadge{background:#fce8e6;color:#c5221f}.nt-end .nh{background:#fdf4f3}
.nt-data .ndot{background:#1773aa}.nt-data .nbadge{background:#e8f2fb;color:#1773aa}.nt-data .nh{background:#f0f6fc}
.nt-db .ndot{background:#137333}.nt-db .nbadge{background:#e6f4ea;color:#137333}.nt-db .nh{background:#f0f9f2}

/* ── EDGES ── */
.ep{fill:none;stroke:#bdc1c6;stroke-width:1.5;marker-end:url(#arr-def);cursor:pointer;pointer-events:stroke;transition:stroke .12s}
.ep:hover{stroke:var(--t3);stroke-width:2}
.ep.esel{stroke:var(--accent);stroke-width:2;marker-end:url(#arr-sel)}
.edelbg{fill:transparent;pointer-events:all;cursor:pointer}
.edeltx{fill:transparent;pointer-events:none;font-size:11px;dominant-baseline:middle;text-anchor:middle}
.edelbg:hover,.edelbg.hov{fill:#fce8e6}
.edeltx.hov{fill:var(--red)}

/* ── COORD DISPLAY ── */
.fcoords-box{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t4);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:3px 8px}

/* ═══════════════════════════════════
   API PLAYGROUND — Pro Dark Terminal
═══════════════════════════════════ */
.api-workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0d1117;animation:fadeUp .15s ease}
.aw-head{background:#161b22;border-bottom:1px solid #21262d;padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.aw-name{font-size:14px;font-weight:600;color:#e6edf3;flex:1;font-family:'JetBrains Mono',monospace}
.aw-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.8px;text-transform:uppercase}
/* Top action btns in dark header */
.aw-hbtn{display:inline-flex;align-items:center;gap:5px;padding:0 12px;height:30px;border-radius:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;transition:all .12s;color:#8b949e}
.aw-hbtn:hover{background:rgba(255,255,255,.12);color:#e6edf3}
.aw-hbtn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round}

/* Request URL bar */
.req-urlbar{display:flex;align-items:center;gap:0;background:#161b22;border-bottom:1px solid #21262d;padding:12px 16px;flex-shrink:0}
.url-method-sel{height:36px;background:#21262d;border:1px solid #30363d;border-right:none;border-radius:4px 0 0 4px;padding:0 10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;color:#e6edf3;outline:none;cursor:pointer;appearance:none;min-width:80px}
.url-method-sel:focus{border-color:#388bfd}
.url-input{flex:1;height:36px;background:#21262d;border:1px solid #30363d;border-radius:0;border-left:none;border-right:none;padding:0 14px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#e6edf3;outline:none}
.url-input:focus{border-color:#388bfd;background:#1c2128}
.url-input::placeholder{color:#3d444d}
.send-btn-main{height:36px;padding:0 18px;background:#238636;border:1px solid #2ea043;border-radius:0 4px 4px 0;color:#fff;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:7px;white-space:nowrap}
.send-btn-main:hover{background:#2ea043}
.send-btn-main:disabled{opacity:.5;cursor:not-allowed}
.send-btn-main svg{width:12px;height:12px;fill:currentColor}

/* Main body split */
.aw-body{flex:1;display:flex;overflow:hidden}
.aw-left{width:50%;border-right:1px solid #21262d;display:flex;flex-direction:column;overflow:hidden}
.aw-right{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Tabs inside panels */
.aw-tabs{display:flex;background:#161b22;border-bottom:1px solid #21262d;padding:0 14px;flex-shrink:0;gap:0}
.aw-tab{padding:0 14px;height:38px;display:flex;align-items:center;font-size:12.5px;font-weight:500;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.aw-tab:hover{color:#c9d1d9}
.aw-tab.on{color:#e6edf3;border-bottom-color:#388bfd}

/* Tab panels */
.aw-panel{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.aw-section{padding:14px 16px;border-bottom:1px solid #21262d}
.aw-section-ttl{font-size:10.5px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.aw-inp{width:100%;height:34px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:0 11px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#e6edf3;outline:none;transition:border-color .12s}
.aw-inp:focus{border-color:#388bfd;background:#0d1117}
.aw-inp::placeholder{color:#3d444d}
.aw-ta{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#e6edf3;outline:none;resize:vertical;min-height:120px;transition:border-color .12s;line-height:1.65}
.aw-ta:focus{border-color:#388bfd}
.aw-ta::placeholder{color:#3d444d}
.kv-row{display:grid;grid-template-columns:1fr 1fr 28px;gap:5px;margin-bottom:5px}
.kv-inp{height:30px;background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:0 9px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#e6edf3;outline:none;width:100%}
.kv-inp:focus{border-color:#388bfd}.kv-inp::placeholder{color:#3d444d}
.kv-del{width:28px;height:28px;background:none;border:none;border-radius:5px;cursor:pointer;color:#484f58;display:flex;align-items:center;justify-content:center;transition:all .1s}
.kv-del:hover{background:rgba(248,81,73,.12);color:#f85149}
.kv-del svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round}

.kv-add:hover{background:rgba(56,139,253,.08);border-color:rgba(56,139,253,.6)}

/* cURL tab */
.curl-import-zone{display:flex;flex-direction:column;flex:1;overflow:hidden}
.curl-label{padding:12px 16px 6px;font-size:10.5px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.curl-parse-btn{font-size:11.5px;font-family:'JetBrains Mono',monospace;font-weight:600;color:#3fb950;background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.25);border-radius:5px;cursor:pointer;padding:4px 12px;transition:all .1s}
.curl-parse-btn:hover{background:rgba(63,185,80,.18)}
.curl-ta{flex:1;resize:none;background:#0d1117;border:none;border-top:1px solid #21262d;outline:none;color:#c9d1d9;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;padding:14px 16px;caret-color:#3fb950}
.curl-ta::placeholder{color:#3d444d}

/* Response pane */
.resp-status-bar{background:#161b22;border-bottom:1px solid #21262d;padding:0 16px;height:40px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.resp-status{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.rs-ok{color:#3fb950}.rs-err{color:#f85149}.rs-warn{color:#e3b341}
.resp-time,.resp-size{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#6e7681;display:flex;align-items:center;gap:4px}
.resp-time svg,.resp-size svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2}
.resp-body-wrap{flex:1;overflow-y:auto}
.resp-json{padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#e6edf3;line-height:1.7;white-space:pre-wrap;word-break:break-all}
.resp-json .j-key{color:#79c0ff}.resp-json .j-str{color:#a5d6ff}.resp-json .j-num{color:#f2cc60}.resp-json .j-bool,.resp-json .j-null{color:#ff7b72}
.resp-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#3d444d;padding:40px}
.resp-empty-ico{width:52px;height:52px;border:1.5px solid #21262d;border-radius:12px;display:flex;align-items:center;justify-content:center}

.resp-empty p{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#6e7681}
.resp-empty span{font-size:11.5px;color:#3d444d}
.hdrs-table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:11.5px}

.hdrs-table td{padding:7px 16px;vertical-align:top}
.hdrs-table td:first-child{color:#58a6ff;width:42%;word-break:break-all}
.hdrs-table td:last-child{color:#c9d1d9;word-break:break-all}
</style>

      <div style="height:8px"></div>
      <div class="ni active" id="nav-flows" onclick="sw('flows')">
        <svg viewBox="0 0 16 16"><circle cx="3" cy="8" r="1.8"/><circle cx="13" cy="3.5" r="1.8"/><circle cx="13" cy="12.5" r="1.8"/><line x1="4.8" y1="8" x2="11.2" y2="4.3"/><line x1="4.8" y1="8" x2="11.2" y2="11.7"/></svg>
        Flows<span class="nbadge" id="cnt-f"></span>
      </div>
      <div class="ni" id="nav-documentation" onclick="sw('documentation')">
        <svg viewBox="0 0 16 16"><rect x="2" y="1" width="12" height="14" rx="2"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="8" y2="11"/></svg>
        Documentation<span class="nbadge" id="cnt-d"></span>
      </div>
      <div class="ni" id="nav-sheets" onclick="sw('sheets')">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="14" rx="2"/><line x1="1" y1="5" x2="15" y2="5"/><line x1="1" y1="9" x2="15" y2="9"/><line x1="5" y1="5" x2="5" y2="15"/><line x1="10" y1="5" x2="10" y2="15"/></svg>
        Sheets<span class="nbadge" id="cnt-s"></span>
      </div>
      <div class="ni" id="nav-api" onclick="sw('api')">
        <svg viewBox="0 0 16 16"><polyline points="3,5 1,8 3,11"/><polyline points="13,5 15,8 13,11"/><line x1="9" y1="2" x2="7" y2="14"/></svg>
        API Playground<span class="nbadge" id="cnt-a"></span>
      </div>
    </div>
    <div class="sb-div"></div>
    <div style="flex:1;padding:8px 0;overflow-y:auto" id="sb-recents-area"></div>
    <div style="padding:8px 0">
      <button class="sb-footer-btn" onclick="handleNew()">
        <svg viewBox="0 0 14 14"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg>
        <span id="sb-new-lbl">New Flow</span>
      </button>
    </div>
  </aside>

  <main id="main">
    <div class="empty-state" id="empty">
      <div class="empty-ico"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></div>
      <h3>Nothing here yet</h3>
      <p>Select a section from the sidebar to get started.</p>
      <button class="btn btn-p btn-sm" onclick="handleNew()">Create New</button>
    </div>
  </main>
</div>

<footer>Product by <span>Abhishek Tiwari</span> &nbsp;·&nbsp; D2C</footer>

<!-- CREATE MODAL -->
<div id="create-modal" style="display:none">
  <div class="modal-back" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-head">
        <h3 id="modal-ttl">New Flow</h3>
        <button class="ib" onclick="closeModal()"><svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg></button>
      </div>
      <div class="modal-body">
        <label class="flbl">Title</label>
        <input class="finp" id="modal-inp" placeholder="Give it a clear name…" maxlength="80" onkeydown="if(event.key==='Enter')createItem()"/>
        <div id="api-xfields" style="display:none">
          <label class="flbl">Method & URL</label>
          <div class="f2col" style="margin-bottom:14px">
            <select class="finp no-mb" id="api-meth" style="padding:0 8px">
              <option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option>
            </select>
            <input class="finp no-mb" id="api-xurl" placeholder="https://api.example.com/…"/>
          </div>
          <label class="flbl">Description</label>
          <input class="finp" id="api-xdesc" placeholder="What does this endpoint do?"/>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-p" onclick="createItem()">Create</button>
      </div>
    </div>
  </div>
</div>

<script>
const API='/api';
const S={section:'flows',items:{},activeId:null};
const saveT={};
let cline=null;

function toast(m,t=''){
  document.querySelectorAll('.snackbar').forEach(x=>x.remove());
  const icoMap={ok:'<polyline points="2,6 5,9 10,3"/>',err:'<line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>','':`<path d="M6 2a4 4 0 100 8 4 4 0 000-8zM6 4v2M6 7h.01"/>`};
  const ico=icoMap[t]||icoMap[''];
  const el=document.createElement('div');
  el.className='snackbar'+(t?' '+t:'');
  el.innerHTML=`<div class="snackbar-ico"><svg viewBox="0 0 12 12">${ico}</svg></div><span class="snackbar-msg">${m}</span><button class="snackbar-x" onclick="this.parentElement.remove()"><svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>`;
  document.body.appendChild(el);
  setTimeout(()=>{if(el.parentElement){el.style.animation='sbOut .2s ease forwards';setTimeout(()=>el.remove(),200);}},3000);
}

async function apiFetch(path,opts={}){
  const r=await fetch(API+path,{headers:{'Content-Type':'application/json'},...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  const j=await r.json();if(!j.ok)throw new Error(j.error||'Error');return j.data;
}

async function boot(){
  try{const items=await apiFetch('/items');items.forEach(i=>S.items[i._id]=i);updateCnts();sw('flows');}
  catch(e){toast('Cannot reach server','err');}
}
boot();

const SM={
  flows:{label:'Flows',newLabel:'New Flow'},
  documentation:{label:'Documentation',newLabel:'New Document'},
  sheets:{label:'Sheets',newLabel:'New Sheet'},
  api:{label:'API Playground',newLabel:'New API'},
};

function sw(s){
  S.section=s;
  ['flows','documentation','sheets','api'].forEach(x=>document.getElementById('nav-'+x).classList.toggle('active',x===s));
  document.getElementById('hb-sec').textContent=SM[s].label;
  document.getElementById('hdr-new-lbl').textContent=SM[s].newLabel;
  document.getElementById('sb-new-lbl').textContent=SM[s].newLabel;
  document.getElementById('hb-sep').style.display='none';
  document.getElementById('hb-cur').style.display='none';
  renderSbRecents();
  showEmpty(false);
  if(s==='flows')renderFlowGrid();
  else if(s==='documentation')renderDocGrid();
  else if(s==='sheets')renderSheetGrid();
  else if(s==='api')renderApiGrid();
}

function renderSbRecents(){
  const recents=Object.values(S.items).sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,8);
  const colors={flows:'#1a73e8',documentation:'#188038',sheets:'#7b1fa2',api:'#b06000'};
  const area=document.getElementById('sb-recents-area');
  if(!recents.length){area.innerHTML='';return;}
  area.innerHTML=`<div class="sb-label">Recent</div>`+recents.map(r=>`
    <div class="ni" onclick="jumpTo('${r._id}')" style="margin-right:12px">
      <div style="width:7px;height:7px;border-radius:50%;background:${colors[r.type]||'#ccc'};flex-shrink:0"></div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:12.5px">${esc(r.title||'Untitled')}</span>
    </div>`).join('');
}

async function jumpTo(id){
  const item=S.items[id];if(!item)return;
  if(item.type!==S.section)sw(item.type);
  if(item.type==='documentation')setTimeout(()=>openDocOverlay(id),100);
  else if(item.type==='flows')setTimeout(()=>openFlowBuilder(id),100);
  else if(item.type==='sheets')setTimeout(()=>openSheetView(id),100);
  else if(item.type==='api')setTimeout(()=>openApiWorkspace(id),100);
}

function updateCnts(){
  const counts={flows:0,documentation:0,sheets:0,api:0};
  Object.values(S.items).forEach(x=>{if(counts[x.type]!==undefined)counts[x.type]++;});
  Object.entries({flows:'cnt-f',documentation:'cnt-d',sheets:'cnt-s',api:'cnt-a'}).forEach(([t,id])=>{
    document.getElementById(id).textContent=counts[t]||'';
  });
}

function showEmpty(show=true){
  document.getElementById('empty').style.display=show?'flex':'none';
  document.querySelectorAll('.flow-view,.sheet-view,.doc-overlay,.grid-view,.api-workspace').forEach(el=>el.remove());
  if(show)stopFlow();
}

function setBc(title){
  document.getElementById('hb-sep').style.display='';
  const el=document.getElementById('hb-cur');el.style.display='';el.textContent=title;
}

function handleNew(){
  document.getElementById('modal-ttl').textContent=SM[S.section].newLabel;
  document.getElementById('modal-inp').value='';
  document.getElementById('api-xfields').style.display=S.section==='api'?'block':'none';
  if(S.section==='api'){document.getElementById('api-xurl').value='';document.getElementById('api-xdesc').value='';}
  document.getElementById('create-modal').style.display='flex';
  setTimeout(()=>document.getElementById('modal-inp').focus(),50);
}
function closeModal(){document.getElementById('create-modal').style.display='none';}

async function createItem(){
  const title=document.getElementById('modal-inp').value.trim()||'Untitled';
  const body={title,type:S.section};
  if(S.section==='api'){body.url=document.getElementById('api-xurl').value.trim()||'';body.method=document.getElementById('api-meth').value||'GET';body.description=document.getElementById('api-xdesc').value.trim()||'';}
  closeModal();
  try{
    const item=await apiFetch('/items',{method:'POST',body});
    S.items[item._id]=item;updateCnts();renderSbRecents();sw(S.section);
    if(item.type==='documentation')setTimeout(()=>openDocOverlay(item._id),100);
    else if(item.type==='flows')setTimeout(()=>openFlowBuilder(item._id),100);
    else if(item.type==='sheets')setTimeout(()=>openSheetView(item._id),100);
    else if(item.type==='api')setTimeout(()=>openApiWorkspace(item._id),100);
  }catch(e){toast('Failed to create','err');}
}

async function delCard(id,e){
  if(e)e.stopPropagation();
  if(!confirm('Delete this item?'))return;
  try{await apiFetch('/items/'+id,{method:'DELETE'});delete S.items[id];updateCnts();renderSbRecents();sw(S.section);toast('Deleted');}
  catch(e){toast('Delete failed','err');}
}

document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();handleNew();}
  if(e.key==='Escape'){closeModal();}
  if((e.metaKey||e.ctrlKey)&&e.key==='s'&&FI){e.preventDefault();fSaveNow();}
});

function scheduleSave(id,payload,dotId,statId){
  const dot=document.getElementById(dotId),stat=document.getElementById(statId);
  if(dot)dot.classList.add('dirty');if(stat)stat.textContent='Saving…';
  clearTimeout(saveT[id]);
  saveT[id]=setTimeout(async()=>{
    try{const u=await apiFetch('/items/'+id,{method:'PATCH',body:payload});S.items[id]=u;renderSbRecents();updateCnts();if(dot)dot.classList.remove('dirty');if(stat)stat.textContent='Saved';}
    catch(e){toast('Save failed','err');}
  },900);
}

/* ═══ FLOW GRID ═══ */
function renderFlowGrid(){
  showEmpty(false);
  const m=document.getElementById('main');
  const flows=Object.values(S.items).filter(d=>d.type==='flows').sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const view=document.createElement('div');view.className='grid-view';
  view.innerHTML=`
    <div class="gv-topbar">
      <div class="gv-title">Flows <span style="font-size:12px;font-weight:400;color:var(--t4)">${flows.length}</span></div>
      <div class="gv-search"><svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg><input placeholder="Search flows…" oninput="filterGrid(this,'flow-grid-inner','item-card')"/></div>
    </div>
    <div class="gv-body"><div class="card-grid" id="flow-grid-inner"></div></div>`;
  m.appendChild(view);
  const grid=document.getElementById('flow-grid-inner');
  const nc=document.createElement('div');nc.className='new-card';
  nc.innerHTML=`<div class="new-card-ico"><svg viewBox="0 0 14 14"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg></div><span>New Flow</span>`;
  nc.onclick=handleNew;grid.appendChild(nc);
  flows.forEach(f=>{grid.appendChild(makeFlowCard(f));});
}

function makeFlowCard(f){
  const card=document.createElement('div');card.className='item-card';
  const nodes=f.nodes||[];const edges=f.edges||[];
  const date=f.updatedAt?new Date(f.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
  const nodeColors={start:'#188038',process:'#1a73e8',decision:'#f29900',api:'#12808c',note:'#7b1fa2',end:'#d93025',data:'#1773aa',db:'#137333'};
  let previewHTML='';
  const pnodes=nodes.slice(0,6);
  if(pnodes.length){
    const xs=pnodes.map(n=>n.x),ys=pnodes.map(n=>n.y);
    const minX=Math.min(...xs),maxX=Math.max(...xs)+160,minY=Math.min(...ys),maxY=Math.max(...ys)+80;
    const sc=Math.min(180/(maxX-minX||1),90/(maxY-minY||1),.45);
    pnodes.forEach(n=>{const x=((n.x-minX)*sc+10),y=((n.y-minY)*sc+12);const c=nodeColors[n.type]||'#888';
      previewHTML+=`<div class="flow-preview-node" style="left:${x}px;top:${y}px;width:60px;background:${c}15;border-color:${c}50;color:${c}">
        <div style="width:5px;height:5px;border-radius:50%;background:${c};flex-shrink:0"></div>
        <span style="font-size:7px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.title||'')}</span>
      </div>`;
    });
  }else{previewHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--t5)"><svg width="26" height="26" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="3" cy="8" r="1.8"/><circle cx="13" cy="3.5" r="1.8"/><circle cx="13" cy="12.5" r="1.8"/><line x1="4.8" y1="8" x2="11.2" y2="4.3"/><line x1="4.8" y1="8" x2="11.2" y2="11.7"/></svg><span style="font-size:10px">Empty flow</span></div>`;}
  card.innerHTML=`
    <div class="card-preview" style="position:relative">${previewHTML}</div>
    <div class="card-body">
      <div class="card-name">${esc(f.title||'Untitled')}</div>
      <div class="card-meta">
        <span class="card-type-badge badge-flow">FLOW</span>
        <span>${nodes.length} nodes · ${edges.length} edges</span>
        <span style="margin-left:auto">${date}</span>
      </div>
    </div>
    <div class="card-actions">
      <button class="ca-btn" onclick="delCard('${f._id}',event)" title="Delete">
        <svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
      </button>
    </div>`;
  card.addEventListener('click',()=>openFlowBuilder(f._id));
  return card;
}

/* ═══ DOC GRID ═══ */
function renderDocGrid(){
  showEmpty(false);
  const m=document.getElementById('main');
  const docs=Object.values(S.items).filter(d=>d.type==='documentation').sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const view=document.createElement('div');view.className='grid-view';
  view.innerHTML=`
    <div class="gv-topbar">
      <div class="gv-title">Documentation <span style="font-size:12px;font-weight:400;color:var(--t4)">${docs.length}</span></div>
      <div class="gv-search"><svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg><input placeholder="Search docs…" oninput="filterGrid(this,'doc-grid-inner','item-card')"/></div>
    </div>
    <div class="gv-body"><div class="card-grid" id="doc-grid-inner"></div></div>`;
  m.appendChild(view);
  const grid=document.getElementById('doc-grid-inner');
  const nc=document.createElement('div');nc.className='new-card';
  nc.innerHTML=`<div class="new-card-ico"><svg viewBox="0 0 14 14"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg></div><span>New Document</span>`;
  nc.onclick=handleNew;grid.appendChild(nc);
  docs.forEach(doc=>{
    const card=document.createElement('div');card.className='item-card';
    const date=doc.updatedAt?new Date(doc.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    const wc=doc.content?(doc.content.replace(/<[^>]+>/g,' ').trim().split(/\s+/).filter(Boolean).length):0;
    card.innerHTML=`
      <div class="card-preview"><div class="doc-preview-wrap"><div class="doc-preview-inner">${doc.content||'<p style="color:var(--t5);font-style:italic">Empty document…</p>'}</div></div><div class="doc-preview-fade"></div></div>
      <div class="card-body">
        <div class="card-name">${esc(doc.title||'Untitled')}</div>
        <div class="card-meta"><span class="card-type-badge badge-doc">DOC</span><span>${wc} words</span><span style="margin-left:auto">${date}</span></div>
      </div>
      <div class="card-actions">
        <button class="ca-btn" onclick="delCard('${doc._id}',event)"><svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg></button>
      </div>`;
    card.addEventListener('click',()=>openDocOverlay(doc._id));
    grid.appendChild(card);
  });
}

/* ═══ SHEET GRID ═══ */
function renderSheetGrid(){
  showEmpty(false);
  const m=document.getElementById('main');
  const sheets=Object.values(S.items).filter(d=>d.type==='sheets').sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const view=document.createElement('div');view.className='grid-view';
  view.innerHTML=`
    <div class="gv-topbar">
      <div class="gv-title">Sheets <span style="font-size:12px;font-weight:400;color:var(--t4)">${sheets.length}</span></div>
      <div class="gv-search"><svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg><input placeholder="Search sheets…"/></div>
    </div>
    <div class="gv-body"><div class="card-grid" id="sheet-grid-inner"></div></div>`;
  m.appendChild(view);
  const grid=document.getElementById('sheet-grid-inner');
  const nc=document.createElement('div');nc.className='new-card';
  nc.innerHTML=`<div class="new-card-ico"><svg viewBox="0 0 14 14"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg></div><span>New Sheet</span>`;
  nc.onclick=handleNew;grid.appendChild(nc);
  sheets.forEach(sh=>{
    const card=document.createElement('div');card.className='item-card';
    const date=sh.updatedAt?new Date(sh.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    const shData=sh.sheetData||{};const firstSheet=Object.values(shData)[0]||{};
    const cellCount=Object.keys(firstSheet).length;
    const cols=['A','B','C','D'];
    let miniHTML='<div class="sheet-mini">';
    miniHTML+='<div class="sheet-mini-cell hd"></div>';
    cols.forEach(c=>miniHTML+=`<div class="sheet-mini-cell hd">${c}</div>`);
    for(let r=1;r<=5;r++){miniHTML+=`<div class="sheet-mini-cell hd">${r}</div>`;cols.forEach(c=>{const cell=firstSheet[c+r];miniHTML+=`<div class="sheet-mini-cell">${esc(cell?.v||'')}</div>`;});}
    miniHTML+='</div>';
    card.innerHTML=`
      <div class="card-preview">${miniHTML}<div class="doc-preview-fade" style="background:linear-gradient(transparent,var(--s2))"></div></div>
      <div class="card-body">
        <div class="card-name">${esc(sh.title||'Untitled')}</div>
        <div class="card-meta"><span class="card-type-badge badge-sheet">SHEET</span><span>${cellCount} cells</span><span style="margin-left:auto">${date}</span></div>
      </div>
      <div class="card-actions">
        <button class="ca-btn" onclick="delCard('${sh._id}',event)"><svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg></button>
      </div>`;
    card.addEventListener('click',()=>openSheetView(sh._id));
    grid.appendChild(card);
  });
}

/* ═══ API GRID ═══ */
function renderApiGrid(){
  showEmpty(false);
  const m=document.getElementById('main');
  const apis=Object.values(S.items).filter(d=>d.type==='api').sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt));
  const view=document.createElement('div');view.className='grid-view';
  view.innerHTML=`
    <div class="gv-topbar">
      <div class="gv-title">API Playground <span style="font-size:12px;font-weight:400;color:var(--t4)">${apis.length}</span></div>
      <div class="gv-search"><svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg><input placeholder="Search endpoints…" oninput="filterGrid(this,'api-grid-inner','curl-card')"/></div>
    </div>
    <div class="gv-body"><div class="card-grid" id="api-grid-inner"></div></div>`;
  m.appendChild(view);
  const grid=document.getElementById('api-grid-inner');
  // New card button
  const nc=document.createElement('div');nc.className='new-card';
  nc.innerHTML=`<div class="new-card-ico"><svg viewBox="0 0 14 14"><line x1="7" y1="2" x2="7" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/></svg></div><span>New API</span>`;
  nc.onclick=handleNew;grid.appendChild(nc);
  apis.forEach(api=>{grid.appendChild(makeCurlCard(api));});
}

function makeCurlCard(api){
  const card=document.createElement('div');card.className='curl-card';
  const method=api.method||'GET';
  const date=api.updatedAt?new Date(api.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
  const curlPreview=api.curlRaw?api.curlRaw.trim().slice(0,200):(api.url?`curl -X ${method} "${api.url}"`:'No cURL saved yet');
  card.innerHTML=`
    <div class="curl-card-head">
      <div class="curl-card-ico"><svg viewBox="0 0 16 16"><polyline points="3,5 1,8 3,11"/><polyline points="13,5 15,8 13,11"/><line x1="9" y1="2" x2="7" y2="14"/></svg></div>
      <div class="curl-card-info">

function buildSGrid(){
  const t=document.getElementById('sgrid');if(!t)return;
  let h='<thead><tr><th class="rn ch" style="position:sticky;top:0;left:0;z-index:4"></th>';
  for(let c=0;c<SCOLS;c++)h+=`<th class="ch" data-col="${c}">${colName(c)}</th>`;
  h+='</tr></thead><tbody>';
  for(let r=0;r<SROWS;r++){h+=`<tr><th class="rn" data-row="${r}">${r+1}</th>`;for(let c=0;c<SCOLS;c++){const ref=colName(c)+(r+1);h+=`<td class="scell" id="sc-${ref}" data-ref="${ref}" contenteditable="true" spellcheck="false" tabindex="0"></td>`;}h+='</tr>';}
  h+='</tbody>';t.innerHTML=h;refreshSCells();attachSEvts();
}
function refreshSCells(){
  const data=sheetData[activeSh]||{};
  document.querySelectorAll('.scell').forEach(td=>{td.textContent='';td.style.cssText='';});
  Object.entries(data).forEach(([ref,cell])=>{const td=document.getElementById('sc-'+ref);if(!td)return;td.textContent=cell.v||'';if(cell.bold)td.style.fontWeight='600';if(cell.italic)td.style.fontStyle='italic';if(cell.underline)td.style.textDecoration='underline';if(cell.align)td.style.textAlign=cell.align;if(cell.fontSize)td.style.fontSize=cell.fontSize+'px';});
}
function attachSEvts(){
  document.querySelectorAll('.scell').forEach(td=>{
    td.addEventListener('focus',()=>selCell(td.dataset.ref));
    td.addEventListener('input',()=>{const ref=td.dataset.ref;if(!sheetData[activeSh])sheetData[activeSh]={};if(!sheetData[activeSh][ref])sheetData[activeSh][ref]={};sheetData[activeSh][ref].v=td.textContent;document.getElementById('fx-inp').value=td.textContent;shSchedSave();});
    td.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();moveSCell(td.dataset.ref,1,0);}if(e.key==='Tab'){e.preventDefault();moveSCell(td.dataset.ref,0,e.shiftKey?-1:1);}if(e.key==='ArrowUp')moveSCell(td.dataset.ref,-1,0);if(e.key==='ArrowDown')moveSCell(td.dataset.ref,1,0);if(e.key==='ArrowLeft'&&!td.textContent)moveSCell(td.dataset.ref,0,-1);if(e.key==='ArrowRight'&&!td.textContent)moveSCell(td.dataset.ref,0,1);});
    td.addEventListener('paste',e=>{
      e.preventDefault();
      const text=(e.clipboardData||window.clipboardData).getData('text');
      if(!text)return;
      // Split into rows and columns
      const rows=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
      // Remove trailing empty row from Excel copy
      if(rows.length>1&&rows[rows.length-1]==='')rows.pop();
      const cols=rows[0].split('\t');
      // If single cell content (no tabs, no newlines), just paste normally
      if(rows.length===1&&cols.length===1){td.textContent=text;td.dispatchEvent(new Event('input'));return;}
      // Multi-cell paste
      const startRef=td.dataset.ref;
      const startCol=startRef.replace(/[0-9]/g,'').charCodeAt(0)-65;
      const startRow=parseInt(startRef.replace(/[A-Z]/g,''))-1;
      if(!sheetData[activeSh])sheetData[activeSh]={};
      rows.forEach((rowText,ri)=>{
        const cells=rowText.split('\t');
        cells.forEach((val,ci)=>{
          const c=startCol+ci,r=startRow+ri;
          if(c>=SCOLS||r>=SROWS)return;
          const ref=colName(c)+(r+1);
          if(!sheetData[activeSh][ref])sheetData[activeSh][ref]={};
          sheetData[activeSh][ref].v=val;
          const cell=document.getElementById('sc-'+ref);
          if(cell)cell.textContent=val;
        });
      });
      shSchedSave();
      // Move focus to last pasted cell
      const lastCol=Math.min(startCol+cols.length-1,SCOLS-1);
      const lastRow=Math.min(startRow+rows.length-1,SROWS-1);
      document.getElementById('sc-'+colName(lastCol)+(lastRow+1))?.focus();
    });
  });
}
function selCell(ref){activeCell=ref;document.getElementById('fx-ref').textContent=ref;document.getElementById('fx-inp').value=sheetData[activeSh]?.[ref]?.v||'';document.querySelectorAll('.scell.hi').forEach(x=>x.classList.remove('hi'));document.getElementById('sc-'+ref)?.classList.add('hi');const col=ref.replace(/[0-9]/g,''),row=parseInt(ref.replace(/[A-Z]/g,''))-1;document.querySelectorAll('.ch.hi,.rn.hi').forEach(x=>x.classList.remove('hi'));document.querySelector(`.ch[data-col="${col.charCodeAt(0)-65}"]`)?.classList.add('hi');document.querySelector(`.rn[data-row="${row}"]`)?.classList.add('hi');const cell=sheetData[activeSh]?.[ref]||{};document.getElementById('stb-b')?.classList.toggle('on',!!cell.bold);document.getElementById('stb-i')?.classList.toggle('on',!!cell.italic);document.getElementById('stb-u')?.classList.toggle('on',!!cell.underline);}
function moveSCell(ref,dr,dc){const col=ref.replace(/[0-9]/g,'').charCodeAt(0)-65,row=parseInt(ref.replace(/[A-Z]/g,''))-1;document.getElementById('sc-'+colName(Math.max(0,Math.min(SCOLS-1,col+dc)))+(Math.max(0,Math.min(SROWS-1,row+dr))+1))?.focus();}
function fxChange(){if(!activeCell)return;const v=document.getElementById('fx-inp').value;const td=document.getElementById('sc-'+activeCell);if(td)td.textContent=v;if(!sheetData[activeSh])sheetData[activeSh]={};if(!sheetData[activeSh][activeCell])sheetData[activeSh][activeCell]={};sheetData[activeSh][activeCell].v=v;shSchedSave();}
function shFmt(p){if(!activeCell)return;if(!sheetData[activeSh])sheetData[activeSh]={};if(!sheetData[activeSh][activeCell])sheetData[activeSh][activeCell]={};const c=sheetData[activeSh][activeCell];c[p]=!c[p];refreshSCells();document.getElementById('sc-'+activeCell)?.focus();selCell(activeCell);shSchedSave();}
function shAlign(a){if(!activeCell)return;if(!sheetData[activeSh])sheetData[activeSh]={};if(!sheetData[activeSh][activeCell])sheetData[activeSh][activeCell]={};sheetData[activeSh][activeCell].align=a;const td=document.getElementById('sc-'+activeCell);if(td)td.style.textAlign=a;shSchedSave();}
function shFontSize(s){if(!activeCell)return;if(!sheetData[activeSh])sheetData[activeSh]={};if(!sheetData[activeSh][activeCell])sheetData[activeSh][activeCell]={};sheetData[activeSh][activeCell].fontSize=parseInt(s);const td=document.getElementById('sc-'+activeCell);if(td)td.style.fontSize=s+'px';shSchedSave();}
function clrCell(){if(!activeCell)return;if(sheetData[activeSh])delete sheetData[activeSh][activeCell];const td=document.getElementById('sc-'+activeCell);if(td){td.textContent='';td.style.cssText='';}document.getElementById('fx-inp').value='';shSchedSave();}
function renderSvTabs(){const tb=document.getElementById('sv-tabs');if(!tb)return;tb.innerHTML=sheetNames.map(n=>`<button class="sh-tab${n===activeSh?' active':''}" onclick="switchSh('${n}')">${esc(n)}</button>`).join('')+`<button class="sh-add" onclick="addSh()">+</button>`;}
function switchSh(n){activeSh=n;if(!sheetData[n])sheetData[n]={};renderSvTabs();refreshSCells();activeCell=null;document.getElementById('fx-ref').textContent='';document.getElementById('fx-inp').value='';}
function addSh(){const n='Sheet'+(sheetNames.length+1);sheetNames.push(n);sheetData[n]={};switchSh(n);shSchedSave();}
function shSchedSave(){if(!sheetItemId)return;scheduleSave(sheetItemId,{sheetData,sheetNames},'sh-sd','sh-ss');}

          <span class="flt-tooltip">Zoom Out</span>
        </button>
      </div>

      <!-- Shape library -->
      <div class="shape-lib" id="shape-lib" style="display:none">
        <div class="shape-lib-ttl">Add Node</div>
        <div class="shape-lib-grid" id="shape-lib-grid"></div>
      </div>

      <!-- Coords -->
      <div style="position:absolute;top:12px;right:12px;z-index:50">
        <div class="fcoords-box" id="fcoords">0, 0</div>
      </div>

      <!-- Zoom bar -->
      <div class="zoom-bar">
        <button class="zb" onclick="chZ(-.15)">−</button>
        <div class="zlbl" id="zlbl">100%</div>
        <button class="zb" onclick="chZ(.15)">+</button>
      </div>

      <!-- Minimap -->
      <div class="minimap">
        <canvas id="fmm-canvas" width="280" height="180"></canvas>
      </div>
    </div>`;
  m.appendChild(w);

  document.getElementById('fti').addEventListener('input',function(){setBc(this.value||'Untitled');S.items[item._id].title=this.value;if(FI)FI.title=this.value;fSave();});

  const slg=document.getElementById('shape-lib-grid');
  Object.entries(NT).forEach(([k,t])=>{const c=document.createElement('div');c.className='slcard';c.innerHTML=`<div class="slcard-dot" style="background:${t.c}"></div><div class="slcard-label">${t.l}</div>`;c.onclick=()=>{addN(k);closeShapeLib();};slg.appendChild(c);});

  const fc=document.getElementById('fcanvas');
  fc.addEventListener('mousedown',fcMD);fc.addEventListener('mousemove',fcMM);fc.addEventListener('mouseup',fcMU);fc.addEventListener('wheel',fcW,{passive:false});
  fc.addEventListener('mousemove',e=>{if(!FI)return;const r=fc.getBoundingClientRect();const wx=Math.round((e.clientX-r.left-FS.px)/FS.zoom);const wy=Math.round((e.clientY-r.top-FS.py)/FS.zoom);const ce=document.getElementById('fcoords');if(ce)ce.textContent=wx+', '+wy;});

  if(!FS.nodes.length){addN('start',80,120);addN('process',300,120);addN('end',520,120);}
  else drawFlow();

  const onKey=e=>{
    if(e.target.isContentEditable||e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key==='v'||e.key==='V')setTool('select');
    if(e.key==='h'||e.key==='H')setTool('hand');
    if(e.key==='s'||e.key==='S'){e.preventDefault();toggleShapeLib();}
    if(e.key==='c'||e.key==='C')setTool('connect');
    if(e.key==='Delete'||e.key==='Backspace'){if(FS.sel)delN(FS.sel);else if(FS.esel)delE(FS.esel);}
    if(e.key==='+')chZ(.15);if(e.key==='-')chZ(-.15);
    if(e.key==='f'||e.key==='F')fFit();
  };
  document.addEventListener('keydown',onKey);
  w._onKey=onKey;
}

function closeFlowBuilder(){
  const w=document.getElementById('fw');
  if(w&&w._onKey)document.removeEventListener('keydown',w._onKey);
  if(FI&&document.getElementById('funsaved')?.style.display!=='none'){if(!confirm('Unsaved changes. Close anyway?'))return;}
  stopFlow();showEmpty(false);renderFlowGrid();document.getElementById('hb-sep').style.display='none';document.getElementById('hb-cur').style.display='none';
}

function setTool(t){
  fTool=t;
  ['select','hand','shapes','connect'].forEach(x=>document.getElementById('ftool-'+x)?.classList.toggle('active',x===t));
  const fc=document.getElementById('fcanvas');
  if(fc)fc.style.cursor=t==='hand'?'grab':t==='connect'?'crosshair':'default';
  if(t!=='shapes')closeShapeLib();
}

function toggleShapeLib(){showShapeLib=!showShapeLib;document.getElementById('shape-lib').style.display=showShapeLib?'block':'none';document.getElementById('ftool-shapes')?.classList.toggle('active',showShapeLib);}
function closeShapeLib(){showShapeLib=false;document.getElementById('shape-lib').style.display='none';document.getElementById('ftool-shapes')?.classList.remove('active');}

function addN(type,x,y){
  const fc=document.getElementById('fcanvas');if(!fc)return;
  const r=fc.getBoundingClientRect();
  const nx=x!=null?x:(r.width/2-FS.px)/FS.zoom-90;
  const ny=y!=null?y:(r.height/2-FS.py)/FS.zoom-45;
  const id='n'+Date.now()+Math.random().toString(36).slice(2,4);
  FS.nodes.push({id,type,title:NT[type]?.l||'Node',body:'',x:nx,y:ny});
  drawFlow();fSave();
}

function drawFlow(){
  const ng=document.getElementById('ng'),eg=document.getElementById('eg');if(!ng||!eg)return;
  ng.style.transform=`translate(${FS.px}px,${FS.py}px) scale(${FS.zoom})`;
  const svgg=document.querySelector('#fsvg g');
  if(svgg)svgg.setAttribute('transform',`translate(${FS.px},${FS.py}) scale(${FS.zoom})`);
  document.getElementById('zlbl').textContent=Math.round(FS.zoom*100)+'%';
  const ex={};ng.querySelectorAll('.fn').forEach(el=>{ex[el.dataset.nid]=el;});
  const seen=new Set();
  FS.nodes.forEach(n=>{seen.add(n.id);let el=ex[n.id];if(el){el.style.left=n.x+'px';el.style.top=n.y+'px';el.classList.toggle('sel',FS.sel===n.id);}else{el=mkNode(n);ng.appendChild(el);}});
  Object.keys(ex).forEach(id=>{if(!seen.has(id))ex[id].remove();});
  eg.innerHTML='';FS.edges.forEach(e=>eg.appendChild(mkEdge(e)));
  drawMinimap();
}

function mkNode(n){
  const t=NT[n.type]||NT.process;
  const el=document.createElement('div');
  el.className=`fn ${t.cls}${FS.sel===n.id?' sel':''}`;
  el.id='fn'+n.id;el.dataset.nid=n.id;
  el.style.cssText=`left:${n.x}px;top:${n.y}px;pointer-events:all`;
  el.innerHTML=`
    <div class="nh">
      <div class="ndot"></div>
      <div class="ntitle" contenteditable="true" spellcheck="false">${esc(n.title)}</div>
      <div class="nacts">
        <button class="nab ndel"><svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>
      </div>
    </div>
    <div class="nb" contenteditable="true" data-placeholder="Add notes…" spellcheck="false">${esc(n.body)}</div>
    <div class="nfoot">
      <span class="nbadge">${t.b}</span>
      <div class="nport" title="Drag to connect"></div>
    </div>`;
  el.querySelector('.ntitle').addEventListener('input',function(ev){ev.stopPropagation();const node=FS.nodes.find(x=>x.id===n.id);if(node)node.title=this.innerText;fSave();});
  el.querySelector('.nb').addEventListener('input',function(ev){ev.stopPropagation();const node=FS.nodes.find(x=>x.id===n.id);if(node)node.body=this.innerText;fSave();});
  el.querySelector('.ndel').addEventListener('click',ev=>{ev.stopPropagation();delN(n.id);});
  el.querySelector('.nport').addEventListener('mousedown',ev=>{ev.stopPropagation();ev.preventDefault();startCon(ev,n.id);});
  el.addEventListener('mousedown',ev=>nMD(ev,n.id));
  el.addEventListener('click',ev=>{if(!FS.drag)selN(ev,n.id);});
  return el;
}

function mkEdge(e){
  const from=FS.nodes.find(n=>n.id===e.from),to=FS.nodes.find(n=>n.id===e.to);
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  if(!from||!to)return g;
  const x1=from.x+87,y1=from.y+88,x2=to.x+87,y2=to.y;
  const cy=(y1+y2)/2;
  const d=`M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}`;
  const sel=FS.esel===e.id;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);p.setAttribute('class','ep'+(sel?' esel':''));
  p.setAttribute('marker-end',sel?'url(#arr-sel)':'url(#arr-def)');
  p.style.pointerEvents='stroke';
  p.addEventListener('click',ev=>{ev.stopPropagation();FS.esel=e.id;FS.sel=null;drawFlow();});
  const mx=(x1+x2)/2,my=(y1+y2)/2;
  const dbg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  dbg.setAttribute('cx',mx);dbg.setAttribute('cy',my);dbg.setAttribute('r','8');
  dbg.setAttribute('class','edelbg'+(sel?' hov':''));
  const dtx=document.createElementNS('http://www.w3.org/2000/svg','text');
  dtx.setAttribute('x',mx);dtx.setAttribute('y',my);dtx.setAttribute('class','edeltx'+(sel?' hov':''));
  dtx.textContent='×';
  dbg.addEventListener('click',ev=>{ev.stopPropagation();delE(e.id);});
  p.addEventListener('mouseenter',()=>{dbg.classList.add('hov');dtx.classList.add('hov');});
  p.addEventListener('mouseleave',()=>{if(FS.esel!==e.id){dbg.classList.remove('hov');dtx.classList.remove('hov');}});
  g.appendChild(p);g.appendChild(dbg);g.appendChild(dtx);
  return g;
}

function drawMinimap(){
  const canvas=document.getElementById('fmm-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#f8f9fa';ctx.fillRect(0,0,W,H);
  if(!FS.nodes.length)return;
  const xs=FS.nodes.map(n=>n.x),ys=FS.nodes.map(n=>n.y);
  const mnx=Math.min(...xs)-20,mxx=Math.max(...xs)+220,mny=Math.min(...ys)-20,mxy=Math.max(...ys)+120;
  const sx=W/(mxx-mnx||1),sy=H/(mxy-mny||1),s=Math.min(sx,sy);
  const ox=(W-(mxx-mnx)*s)/2,oy=(H-(mxy-mny)*s)/2;
  const nodeColors={start:'#188038',process:'#1a73e8',decision:'#f29900',api:'#12808c',data:'#1773aa',db:'#137333',note:'#7b1fa2',end:'#d93025'};
  FS.edges.forEach(e=>{
    const from=FS.nodes.find(n=>n.id===e.from),to=FS.nodes.find(n=>n.id===e.to);
    if(!from||!to)return;
    ctx.strokeStyle='#bdc1c6';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ox+(from.x-mnx)*s+42*s,oy+(from.y-mny)*s+44*s);ctx.lineTo(ox+(to.x-mnx)*s+42*s,oy+(to.y-mny)*s);ctx.stroke();
  });
  FS.nodes.forEach(n=>{
    const x=ox+(n.x-mnx)*s,y=oy+(n.y-mny)*s,w=87*s,h=44*s;
    const c=nodeColors[n.type]||'#888';
    ctx.fillStyle=c+'20';ctx.strokeStyle=n.id===FS.sel?c:c+'80';ctx.lineWidth=n.id===FS.sel?1.5:0.8;
    ctx.beginPath();ctx.roundRect(x,y,w,h,2);ctx.fill();ctx.stroke();
  });
}

function nMD(ev,id){
  if(ev.target.isContentEditable||ev.target.closest('.ndel')||ev.target.classList.contains('nport'))return;
  if(fTool==='hand')return;
  ev.stopPropagation();
  const fc=document.getElementById('fcanvas');if(!fc)return;
  const n=FS.nodes.find(x=>x.id===id),r=fc.getBoundingClientRect();
  FS.drag=id;FS.dox=(ev.clientX-r.left-FS.px)/FS.zoom-n.x;FS.doy=(ev.clientY-r.top-FS.py)/FS.zoom-n.y;
  document.getElementById('fn'+id)?.classList.add('drag');
}
function selN(ev,id){if(ev.target.isContentEditable)return;FS.sel=FS.sel===id?null:id;FS.esel=null;drawFlow();}
function delN(id){FS.nodes=FS.nodes.filter(n=>n.id!==id);FS.edges=FS.edges.filter(e=>e.from!==id&&e.to!==id);if(FS.sel===id)FS.sel=null;drawFlow();fSave();}
function delE(id){FS.edges=FS.edges.filter(e=>e.id!==id);FS.esel=null;drawFlow();fSave();}

function startCon(ev,fid){
  FS.con=fid;
  cline=document.createElementNS('http://www.w3.org/2000/svg','path');
  cline.setAttribute('fill','none');cline.setAttribute('stroke','#1a73e8');cline.setAttribute('stroke-width','1.5');cline.setAttribute('stroke-dasharray','6,3');cline.style.pointerEvents='none';
  document.getElementById('eg')?.appendChild(cline);
}

function fcMD(ev){
  if(FS.con)return;
  const t=ev.target;
  if(fTool==='hand'||(t.id==='fcanvas'||t.classList.contains('fgrid-bg')||t===document.getElementById('fsvg')||t.tagName==='svg')){
    FS.pan=true;FS.psx=ev.clientX-FS.px;FS.psy=ev.clientY-FS.py;
    document.getElementById('fcanvas').style.cursor='grabbing';
  }
}
function fcMM(ev){
  if(FS.drag){
    const fc=document.getElementById('fcanvas');if(!fc)return;
    const r=fc.getBoundingClientRect(),n=FS.nodes.find(x=>x.id===FS.drag);if(!n)return;
    n.x=(ev.clientX-r.left-FS.px)/FS.zoom-FS.dox;n.y=(ev.clientY-r.top-FS.py)/FS.zoom-FS.doy;
    drawFlow();return;
  }
  if(FS.con&&cline){
    const fc=document.getElementById('fcanvas');if(!fc)return;
    const r=fc.getBoundingClientRect(),fn=FS.nodes.find(x=>x.id===FS.con);if(!fn)return;
    const x1=fn.x+87,y1=fn.y+88;
    const x2=(ev.clientX-r.left-FS.px)/FS.zoom;const y2=(ev.clientY-r.top-FS.py)/FS.zoom;
    const cy=(y1+y2)/2;cline.setAttribute('d',`M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}`);return;
  }
  if(FS.pan){FS.px=ev.clientX-FS.psx;FS.py=ev.clientY-FS.psy;drawFlow();}
}
function fcMU(ev){
  if(FS.con){
    const el=document.elementFromPoint(ev.clientX,ev.clientY);const ne=el?.closest('.fn');
    if(ne){const tid=ne.dataset.nid;if(tid&&tid!==FS.con&&!FS.edges.find(e=>e.from===FS.con&&e.to===tid)){FS.edges.push({id:'e'+Date.now(),from:FS.con,to:tid});fSave();}}
    if(cline){cline.remove();cline=null;}FS.con=null;drawFlow();return;
  }
  if(FS.drag){document.getElementById('fn'+FS.drag)?.classList.remove('drag');FS.drag=null;fSave();}
  if(FS.pan){FS.pan=false;const fc=document.getElementById('fcanvas');if(fc)fc.style.cursor=fTool==='hand'?'grab':'default';}
}
function fcW(ev){
  ev.preventDefault();
  const fc=document.getElementById('fcanvas');if(!fc)return;
  const r=fc.getBoundingClientRect();const d=-ev.deltaY*.001;
  const nz=Math.min(3,Math.max(.15,FS.zoom+d));
  const mx=ev.clientX-r.left,my=ev.clientY-r.top;
  FS.px=mx-(mx-FS.px)*nz/FS.zoom;FS.py=my-(my-FS.py)*nz/FS.zoom;FS.zoom=nz;drawFlow();
}
function chZ(d){FS.zoom=Math.min(3,Math.max(.15,FS.zoom+d));drawFlow();}
function fFit(){
  if(!FS.nodes.length)return;
  const fc=document.getElementById('fcanvas');if(!fc)return;
  const r=fc.getBoundingClientRect();
  const xs=FS.nodes.map(n=>n.x),ys=FS.nodes.map(n=>n.y);
  const mnx=Math.min(...xs),mxx=Math.max(...xs)+180;const mny=Math.min(...ys),mxy=Math.max(...ys)+100;
  FS.zoom=Math.min((r.width-80)/(mxx-mnx||1),(r.height-80)/(mxy-mny||1),1.5);
  FS.px=40-mnx*FS.zoom;FS.py=40-mny*FS.zoom;drawFlow();
}
function fClear(){if(confirm('Clear all nodes and edges?')){FS.nodes=[];FS.edges=[];drawFlow();fSave();}}
function fSave(){if(!FI)return;const el=document.getElementById('funsaved');if(el)el.style.display='inline';}
async function fSaveNow(){
  if(!FI)return;const btn=document.getElementById('fsavebtn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    const u=await apiFetch('/items/'+FI._id,{method:'PATCH',body:{title:document.getElementById('fti')?.value||FI.title||'Untitled',nodes:JSON.parse(JSON.stringify(FS.nodes)),edges:JSON.parse(JSON.stringify(FS.edges)),zoom:FS.zoom,panX:FS.px,panY:FS.py}});
    S.items[FI._id]=u;renderSbRecents();updateCnts();
    const el=document.getElementById('funsaved');if(el)el.style.display='none';
    toast('Saved','ok');
  }catch(e){toast('Save failed','err');}
  finally{if(btn){btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 14 14" style="width:12px;height:12px"><path d="M11 2H3L2 3v9a1 1 0 001 1h9a1 1 0 001-1V3z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>Save';}}
}
