        <div id="resp-pane-${id}" style="display:none;flex:1;display:flex;flex-direction:column;overflow:hidden">
          <div class="resp-status-bar">
            <span class="resp-status" id="rs-stat-${id}"></span>
            <span class="resp-time"><svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="5"/><polyline points="6,3 6,6 8,8"/></svg><span id="rs-time-${id}"></span></span>
            <span class="resp-size"><svg viewBox="0 0 12 12"><path d="M2 4h8M2 8h5"/></svg><span id="rs-size-${id}"></span></span>
          </div>
          <div class="aw-tabs">
            <div class="aw-tab on" id="rtp-body-${id}" onclick="switchRespTab('${id}','body')">Response</div>
            <div class="aw-tab" id="rtp-headers-${id}" onclick="switchRespTab('${id}','headers')">Headers</div>
            <div class="aw-tab" id="rtp-raw-${id}" onclick="switchRespTab('${id}','raw')">Raw</div>
          </div>
          <div class="resp-body-wrap" id="rb-body-${id}"><div class="resp-json" id="rb-json-${id}"></div></div>
          <div class="resp-body-wrap" id="rb-headers-${id}" style="display:none"><table class="hdrs-table" id="rb-hdrs-tbl-${id}"></table></div>
          <div class="resp-body-wrap" id="rb-raw-${id}" style="display:none"><div class="resp-json" id="rb-raw-txt-${id}"></div></div>
        </div>
      </div>
    </div>`;
  m.appendChild(ws);
  // Pre-fill curl raw if saved
  const curlEl=document.getElementById('curl-inp-'+id);
  if(curlEl&&api.curlRaw)curlEl.value=api.curlRaw;
}

function closeApiWorkspace(id){document.getElementById('aws-'+id)?.remove();renderApiGrid();document.getElementById('hb-sep').style.display='none';document.getElementById('hb-cur').style.display='none';AWI=null;}

function awTab(id,tab){
  ['manual','headers','body','auth','curl'].forEach(t=>{
    const p=document.getElementById('awp-'+t+'-'+id);
    const tb=document.getElementById('awt-'+t+'-'+id);
    if(p)p.style.display=t===tab?'flex':'none';
    if(tb)tb.classList.toggle('on',t===tab);
  });
  // Special case for curl tab (flex column)
  const cp=document.getElementById('awp-curl-'+id);
  if(cp&&tab==='curl')cp.style.display='flex';
}

function addKV(id,zone){
  const cont=document.getElementById('kv-'+zone+'-'+id);if(!cont)return;
  const row=document.createElement('div');row.className='kv-row';
  row.innerHTML=`<input class="kv-inp" placeholder="Key"/><input class="kv-inp" placeholder="Value"/><button class="kv-del" onclick="this.parentElement.remove()"><svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>`;
  cont.appendChild(row);
}

function parseCurl(id){
  const raw=document.getElementById('curl-inp-'+id)?.value.trim();if(!raw){toast('Paste a cURL command first','err');return;}
  try{
    const mMatch=raw.match(/-X\s+(\w+)/i);const method=mMatch?mMatch[1].toUpperCase():'GET';
    const urlMatch=raw.match(/['"]?(https?:\/\/[^\s'"\\]+)['"]?/);const url=urlMatch?urlMatch[1].split("'")[0].split('"')[0]:'';
    const hdrs=[];let hM;const hR=/-H\s+['"]([^'"]+)['"]/gi;
    while((hM=hR.exec(raw))!==null){const[k,...vp]=(hM[1]||'').split(/:(.+)/);hdrs.push([k.trim(),vp.join(':').trim()]);}
    const dMatch=raw.match(/-d\s+['"]([^'"]+)['"]/i)||raw.match(/--data(?:-raw)?\s+['"]([^'"]+)['"]/i);
    const body=dMatch?dMatch[1]:'';
    const authHdr=hdrs.find(([k])=>k.toLowerCase()==='authorization');

    // Fill method & URL bar
    const msel=document.getElementById('mf-method-'+id);if(msel)msel.value=method;
    const urlInp=document.getElementById('mf-url-'+id);if(urlInp)urlInp.value=url;

    // Fill auth
    if(authHdr){
      const authInp=document.getElementById('mf-auth-'+id);if(authInp)authInp.value=authHdr[1];
      awTab(id,'auth');
    }

    // Fill headers
    const hdrCont=document.getElementById('kv-hdrs-'+id);
    if(hdrCont){
      const nonAuthHdrs=hdrs.filter(([k])=>k.toLowerCase()!=='authorization');
      if(nonAuthHdrs.length){
        hdrCont.innerHTML='';
        nonAuthHdrs.forEach(([k,v])=>{const row=document.createElement('div');row.className='kv-row';row.innerHTML=`<input class="kv-inp" value="${esc(k)}" placeholder="Header"/><input class="kv-inp" value="${esc(v)}" placeholder="Value"/><button class="kv-del" onclick="this.parentElement.remove()"><svg viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>`;hdrCont.appendChild(row);});
        awTab(id,'headers');
      }
    }

    // Fill body
    if(body){const bodyEl=document.getElementById('mf-body-'+id);if(bodyEl){try{bodyEl.value=JSON.stringify(JSON.parse(body),null,2);}catch{bodyEl.value=body;}awTab(id,'body');}}

    if(!body&&!authHdr)awTab(id,'manual');
    toast('cURL imported ✓','ok');
  }catch(e){toast('Could not parse cURL','err');}
}

async function sendRequest(id){
  const method=document.getElementById('mf-method-'+id)?.value||'GET';
  const url=document.getElementById('mf-url-'+id)?.value.trim()||'';
  if(!url){toast('Enter a URL first','err');return;}

  const headers={};
  // Headers tab
  document.querySelectorAll(`#kv-hdrs-${id} .kv-row`).forEach(r=>{const ins=r.querySelectorAll('.kv-inp');const k=ins[0]?.value.trim(),v=ins[1]?.value.trim();if(k)headers[k]=v||'';});
  // Auth
  const authType=document.getElementById('auth-type-'+id)?.value||'bearer';
  const auth=document.getElementById('mf-auth-'+id)?.value.trim();
  if(auth&&authType!=='none'){
    if(authType==='bearer')headers['Authorization']='Bearer '+auth;
    else if(authType==='basic')headers['Authorization']='Basic '+btoa(auth);
    else if(authType==='apikey')headers['x-api-key']=auth;
  }
  // Query params
  let finalUrl=url;
  const paramPairs=[];
  document.querySelectorAll(`#kv-params-${id} .kv-row`).forEach(r=>{const ins=r.querySelectorAll('.kv-inp');const k=ins[0]?.value.trim(),v=ins[1]?.value.trim();if(k)paramPairs.push([k,v]);});
  if(paramPairs.length){
    const sep=url.includes('?')?'&':'?';
    finalUrl+=sep+paramPairs.map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  }

  const body=document.getElementById('mf-body-'+id)?.value.trim()||'';
  const btn=document.getElementById('send-btn-'+id);
  const initDiv=document.getElementById('resp-init-'+id);
  const respDiv=document.getElementById('resp-pane-'+id);

  btn.disabled=true;btn.innerHTML='<span style="width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .6s linear infinite"></span> Sending';
  if(initDiv)initDiv.style.display='none';if(respDiv){respDiv.style.display='flex';}

  const t0=Date.now();
  try{
    if(!headers['Content-Type']&&['POST','PUT','PATCH'].includes(method)&&body)headers['Content-Type']='application/json';
    const opts={method,headers};if(['POST','PUT','PATCH'].includes(method)&&body)opts.body=body;
    const res=await fetch(finalUrl,opts);
    const elapsed=Date.now()-t0;
    const text=await res.text();
    respHeaders={};res.headers.forEach((v,k)=>{respHeaders[k]=v;});

    const statEl=document.getElementById('rs-stat-'+id);
    const cls=res.ok?'rs-ok':res.status>=400?'rs-err':'rs-warn';
    if(statEl)statEl.innerHTML=`<span class="${cls}">${res.status}</span> <span style="color:#6e7681;font-size:11px;font-family:inherit">${res.statusText}</span>`;
    const tEl=document.getElementById('rs-time-'+id);if(tEl)tEl.textContent=elapsed+'ms';
    const sEl=document.getElementById('rs-size-'+id);if(sEl)sEl.textContent=fmtSize(new Blob([text]).size);

    let pretty=text;
    const jsonEl=document.getElementById('rb-json-'+id);
    try{const j=JSON.parse(text);pretty=JSON.stringify(j,null,2);if(jsonEl)jsonEl.innerHTML=syntaxHL(pretty);}
    catch{if(jsonEl)jsonEl.textContent=text;}

    const rawEl=document.getElementById('rb-raw-txt-'+id);if(rawEl)rawEl.textContent=text;

    const tbl=document.getElementById('rb-hdrs-tbl-'+id);
    if(tbl){tbl.innerHTML='<tr style="border-bottom:1px solid #21262d"><td style="padding:5px 16px;color:#6e7681;font-size:10px;font-weight:700;letter-spacing:.6px">NAME</td><td style="padding:5px 16px;color:#6e7681;font-size:10px;font-weight:700;letter-spacing:.6px">VALUE</td></tr>'+Object.entries(respHeaders).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join('');}

    switchRespTab(id,'body');
  }catch(err){
    const statEl=document.getElementById('rs-stat-'+id);if(statEl)statEl.innerHTML='<span class="rs-err">Network Error</span>';
    const jsonEl=document.getElementById('rb-json-'+id);if(jsonEl)jsonEl.textContent=err.message;
    if(initDiv)initDiv.style.display='none';if(respDiv)respDiv.style.display='flex';
  }
  btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 12 12" style="width:12px;height:12px"><polygon points="2,2 10,6 2,10" fill="currentColor"/></svg>Send';
}

function switchRespTab(id,tab){
  ['body','headers','raw'].forEach(t=>{
    const el=document.getElementById('rb-'+t+'-'+id);if(el)el.style.display=t===tab?'block':'none';
    document.getElementById('rtp-'+t+'-'+id)?.classList.toggle('on',t===tab);
  });
}

function syntaxHL(j){
  return j.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|true|false|null|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g,match=>{
    let cls='j-num';
    if(/^"/.test(match)){cls=/:$/.test(match)?'j-key':'j-str';}
    else if(/true|false/.test(match))cls='j-bool';
    else if(/null/.test(match))cls='j-null';
    return `<span class="${cls}">${match}</span>`;
  });
}

function fmtSize(bytes){if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(1)+'KB';return(bytes/1048576).toFixed(1)+'MB';}

async function saveApiItem(id){
  const method=document.getElementById('mf-method-'+id)?.value||'GET';
  const url=document.getElementById('mf-url-'+id)?.value||'';
  const curlRaw=document.getElementById('curl-inp-'+id)?.value||'';
  try{const u=await apiFetch('/items/'+id,{method:'PATCH',body:{method,url,curlRaw}});S.items[id]=u;toast('Saved','ok');}
  catch(e){toast('Save failed','err');}
}

function doSearch(){
  const q=prompt('Search:');if(!q)return;
  const r=Object.values(S.items).filter(d=>d.title?.toLowerCase().includes(q.toLowerCase()));
  if(!r.length){toast('Nothing found');return;}
  if(r.length===1){sw(r[0].type);setTimeout(()=>jumpTo(r[0]._id),200);return;}
  const c=prompt(r.map((d,i)=>`${i+1}. [${d.type}] ${d.title}`).join('\n')+'\n\nEnter number:');
  const ix=parseInt(c);if(ix>0&&r[ix-1]){sw(r[ix-1].type);setTimeout(()=>jumpTo(r[ix-1]._id),200);}
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
